name: Fork Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "T3 Dulli community release version (for example 0.0.29-pi.4)"
        required: true
        default: "0.0.29-pi.4"
        type: string

permissions:
  contents: read

concurrency:
  group: fork-desktop-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - id: release_meta
        name: Validate release version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${RAW_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+$ ]]; then
            echo "Fork desktop releases require a prerelease version such as 0.0.29-pi.1." >&2
            exit 1
          fi
          tag="v$version"
          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test release integrations
        run: |
          vp test --retry=1 \
            scripts/build-desktop-artifact.test.ts \
            apps/desktop/src/app/DesktopEnvironment.test.ts \
            apps/desktop/src/electron/ElectronApp.test.ts \
            apps/desktop/src/updates/DesktopUpdates.test.ts \
            packages/contracts/src/settings.test.ts \
            packages/contracts/src/subagents.test.ts \
            packages/client-runtime/src/state/subagentRuntime.test.ts \
            apps/server/src/provider/pi/piJsonl.test.ts \
            apps/server/src/provider/pi/piModelDiscovery.test.ts \
            apps/server/src/provider/pi/piRpcProtocol.test.ts \
            apps/server/src/provider/Layers/PiAdapter.test.ts \
            apps/server/src/vcs/GitVcsDriver.test.ts \
            apps/server/src/vcs/GitVcsDriverCore.test.ts \
            apps/server/src/vcs/WorklerWorkspaceService.test.ts \
            apps/web/src/components/settings/ProviderSettingsForm.test.ts \
            apps/web/src/components/subagents/subagentPresentation.test.ts \
            apps/mobile/src/lib/modelOptions.test.ts \
            apps/mobile/src/features/threads/subagents/subagentPresentation.test.ts

  build_wsl_node_pty:
    name: Build WSL node-pty (linux-x64)
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build node-pty Linux prebuild
        shell: bash
        run: |
          set -euo pipefail
          pty_pkg="$(node -e "console.log(require.resolve('node-pty/package.json', { paths: ['$GITHUB_WORKSPACE/apps/server'] }))")"
          pty_dir="$(dirname "$pty_pkg")"
          (cd "$pty_dir" && npx --yes node-gyp rebuild)
          mkdir -p wsl-prebuild
          cp "$pty_dir/build/Release/pty.node" wsl-prebuild/pty.node
          file wsl-prebuild/pty.node

      - name: Upload WSL prebuild
        uses: actions/upload-artifact@v7
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild/pty.node
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    needs: [preflight, build_wsl_node_pty]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-14
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
          - label: Windows x64
            runner: windows-2025
            platform: win
            target: nsis
            arch: x64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      T3CODE_DESKTOP_UPDATE_REPOSITORY: YJJosh/t3code
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Import persistent macOS community signing certificate
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DULLI_MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DULLI_MACOS_CERTIFICATE_PASSWORD }}
          EXPECTED_CERTIFICATE_SHA1: ${{ vars.DULLI_MACOS_CERTIFICATE_SHA1 }}
        run: |
          set -euo pipefail
          if [[ -z "$CERTIFICATE_P12_BASE64" || -z "$CERTIFICATE_PASSWORD" ]]; then
            echo "DULLI_MACOS_CERTIFICATE_P12_BASE64 and DULLI_MACOS_CERTIFICATE_PASSWORD must be configured as repository secrets." >&2
            exit 1
          fi
          expected_identity="$(printf '%s' "$EXPECTED_CERTIFICATE_SHA1" | tr '[:lower:]' '[:upper:]')"
          if [[ ! "$expected_identity" =~ ^[0-9A-F]{40}$ ]]; then
            echo "DULLI_MACOS_CERTIFICATE_SHA1 must be configured as a 40-character repository variable." >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/t3-dulli-community-signing.p12"
          certificate_pem_path="$RUNNER_TEMP/t3-dulli-community-signing.pem"
          keychain_path="$RUNNER_TEMP/t3-dulli-community-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          echo "::add-mask::$keychain_password"
          echo "DULLI_MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          cleanup_sensitive_files() {
            rm -f "$certificate_path" "$certificate_pem_path"
          }
          trap cleanup_sensitive_files EXIT

          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          openssl pkcs12 \
            -in "$certificate_path" \
            -clcerts \
            -nokeys \
            -passin env:CERTIFICATE_PASSWORD \
            -out "$certificate_pem_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -x \
            -T /usr/bin/codesign
          echo "Imported the non-extractable community signing identity."

          # User-domain trust opens SecurityAgent and hangs on headless GitHub runners. The
          # runners provide passwordless sudo, so install only the public certificate in the
          # ephemeral VM's admin trust domain and remove it immediately after verification.
          sudo -n security add-trusted-cert \
            -d \
            -r trustRoot \
            -p codeSign \
            -k /Library/Keychains/System.keychain \
            "$certificate_pem_path"
          echo "Trusted the community certificate for code signing on this ephemeral runner."

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path" >/dev/null

          current_keychains=()
          while IFS= read -r current_keychain; do
            current_keychain="${current_keychain#*\"}"
            current_keychain="${current_keychain%\"*}"
            if [[ -n "$current_keychain" ]]; then
              current_keychains+=("$current_keychain")
            fi
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$keychain_path" "${current_keychains[@]}"

          identities="$(security find-identity -v -p codesigning "$keychain_path")"
          identity_count="$(printf '%s\n' "$identities" | awk '/^[[:space:]]*[0-9]+\)/ { count++ } END { print count + 0 }')"
          if [[ "$identity_count" != "1" ]]; then
            echo "Expected exactly one valid code-signing identity in the community signing certificate; found $identity_count." >&2
            exit 1
          fi
          identity="$(printf '%s\n' "$identities" | awk '/^[[:space:]]*[0-9]+\)/ { print $2; exit }')"
          if [[ ! "$identity" =~ ^[0-9A-F]{40}$ ]]; then
            echo "Could not resolve the community signing certificate SHA-1 identity." >&2
            exit 1
          fi
          if [[ "$identity" != "$expected_identity" ]]; then
            echo "The imported community signing certificate does not match DULLI_MACOS_CERTIFICATE_SHA1." >&2
            exit 1
          fi

          echo "T3CODE_MACOS_COMMUNITY_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Download WSL prebuild
        if: matrix.platform == 'win'
        uses: actions/download-artifact@v8
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild

      - name: Install Spectre-mitigated MSVC libraries
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -products * -latest -property installationPath
          $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setupExe `
            -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
            -Wait -PassThru -NoNewWindow
          if ($null -eq $proc -or $proc.ExitCode -ne 0) {
            $code = if ($null -ne $proc) { $proc.ExitCode } else { 1 }
            throw "Visual Studio Installer failed with exit code $code"
          }

      - name: Install ImageMagick
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

      - name: Build desktop artifact
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --brand dulli
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            args+=(--wsl-prebuild "$GITHUB_WORKSPACE/wsl-prebuild/pty.node")
          fi
          vp run dist:desktop:artifact "${args[@]}"

      - name: Verify macOS app signature
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.version }}"
          dmg="release/T3-Dulli-${version}-${{ matrix.arch }}.dmg"
          mount_point="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_point" >/dev/null 2>&1 || true
            rmdir "$mount_point" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg" -readonly -nobrowse -mountpoint "$mount_point" >/dev/null
          app="$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          signature="$(codesign --display --verbose=4 "$app" 2>&1)"
          requirement="$(codesign --display --requirements - "$app" 2>&1)"
          identity_lower="$(printf '%s' "$T3CODE_MACOS_COMMUNITY_SIGNING_IDENTITY" | tr '[:upper:]' '[:lower:]')"
          printf '%s\n' "$signature" | grep -q 'Identifier=com.yjjosh.t3dulli'
          printf '%s\n' "$signature" | grep -q 'Authority=T3 Dulli Community Code Signing'
          printf '%s\n' "$requirement" | grep -Fq \
            "identifier \"com.yjjosh.t3dulli\" and certificate root = H\"$identity_lower\""

      - name: Remove macOS private-key keychain
        if: always() && matrix.platform == 'mac'
        shell: bash
        run: |
          if [[ -n "${DULLI_MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$DULLI_MACOS_SIGNING_KEYCHAIN" || true
          fi

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-${{ matrix.arch }}.yml"
            done
          fi

          if [[ -z "$(find release-publish -maxdepth 1 -type f -print -quit)" ]]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          version="${{ needs.preflight.outputs.version }}"
          case "${{ matrix.platform }}" in
            mac)
              test -s "release-publish/T3-Dulli-${version}-${{ matrix.arch }}.dmg"
              test -s "release-publish/T3-Dulli-${version}-${{ matrix.arch }}.zip"
              if [[ "${{ matrix.arch }}" == "arm64" ]]; then
                test -s "release-publish/latest-mac.yml"
              else
                test -s "release-publish/latest-mac-${{ matrix.arch }}.yml"
              fi
              ;;
            linux)
              test -s "release-publish/T3-Dulli-${version}-x86_64.AppImage"
              test -s "release-publish/latest-linux.yml"
              ;;
            win)
              test -s "release-publish/T3-Dulli-${version}-x64.exe"
              test -s "release-publish/latest.yml"
              ;;
          esac

          for manifest in release-publish/latest*.yml; do
            grep -q 'T3-Dulli-' "$manifest" || {
              echo "Updater manifest does not reference a branded Dulli artifact: $manifest" >&2
              exit 1
            }
          done

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish community desktop release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t3tools/scripts...

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for x64_manifest in release-assets/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-update-manifests.ts --platform mac "$arm64_manifest" "$x64_manifest"
              rm -f "$x64_manifest"
            fi
          done

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: T3 Dulli ${{ needs.preflight.outputs.tag }}
          prerelease: true
          make_latest: false
          body: |
            T3 Dulli community build from `YJJosh/t3code`.

            Highlights:
            - First-class Dulli identity, :D artwork, isolated state, and built-in prerelease updates
            - Pi as a first-class coding-agent provider, including extension-provided models
            - Live Pi subagent activity and controls on desktop/web, with read-only mobile visibility
            - Workler clones for isolated workspaces, with a Git-worktree fallback setting

            The macOS app has a persistent self-signed community signature but is not
            Apple-notarized, so macOS displays an unverified-developer warning on first launch.
            After copying it to Applications, approve it under
            **System Settings → Privacy & Security → Open Anyway**. If the installed copy predates
            persistent community signing, macOS will reject its built-in update once; manually
            replace the app with this release, and later signed updates can install normally.
            The Windows installer is unsigned and may display a Microsoft Defender SmartScreen
            warning; choose **More info → Run anyway** only if you trust this build.
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true
