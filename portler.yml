# Run the web development stack with checkout-scoped ports and runtime state.
#
#   portler up -d
#   portler ps
#   portler logs --follow
#   portler down
services:
  server:
    command: T3CODE_HOME="$PWD/.portler/t3-home" ./node_modules/.bin/vp run --filter=t3 dev
    port: 13773
    port_env: T3CODE_PORT
    env:
      T3CODE_HOST: 127.0.0.1
      T3CODE_MODE: web
      T3CODE_NO_BROWSER: 1
      VITE_DEV_SERVER_URL: web.url

  web:
    command: ./node_modules/.bin/vp run --filter=@t3tools/web dev
    port: 5733
    port_env: PORT
    depends_on:
      - server
    env:
      HOST: 127.0.0.1
      VITE_HTTP_URL: server.url
      VITE_WS_URL: ws://${server.url_host}:${server.port}
